# Local Kafka for development (Redpanda = Kafka-compatible, single command)
services:
  redpanda:
    image: redpandadata/redpanda:v24.2.4
    container_name: stockpredict-kafka
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://127.0.0.1:19092
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --mode dev-container
    ports:
      - "19092:19092"
